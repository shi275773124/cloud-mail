name: Add Cursor DNS (ephemeral)
on:
  workflow_dispatch:
jobs:
  add-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Set cursor A record DNS-only
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          ZONE=fef53ad39445fd5448655dbb41aa825a
          IP=95.217.163.4
          NAME=cursor.zjdeng.xyz
          EXISTING=$(curl -sS "https://api.cloudflare.com/client/v4/zones/${ZONE}/dns_records?name=${NAME}" -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          echo "$EXISTING" | python3 -m json.tool
          REC_ID=$(python3 -c "import json,sys; d=json.load(sys.stdin); r=d.get('result',[]); print(r[0]['id'] if r else '')" <<<"$EXISTING")
          DATA="{\"type\":\"A\",\"name\":\"cursor\",\"content\":\"${IP}\",\"ttl\":1,\"proxied\":false}"
          if [ -n "$REC_ID" ]; then
            curl -sS -X PATCH "https://api.cloudflare.com/client/v4/zones/${ZONE}/dns_records/${REC_ID}" -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json" --data "$DATA"
          else
            curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/${ZONE}/dns_records" -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json" --data "$DATA"
          fi | python3 -m json.tool
