name: D1 admin Tina tmp bind

on:
  push:
    branches: [ main, master ]
    paths:
      - '.github/workflows/d1-admin-tina-tmp-bind.yml'

permissions:
  contents: write

jobs:
  bind-tina-tmp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Bind active tmp mailboxes to Tina and verify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          cat > /tmp/bind.sql <<'SQL'
          -- before
          SELECT account_id,email,user_id,is_del
          FROM account
          WHERE is_del=0 AND user_id=1 AND email LIKE 'tmp-%@chrisshi168.dpdns.org'
          ORDER BY account_id;

          UPDATE account
          SET user_id=2, is_del=0
          WHERE is_del=0
            AND user_id=1
            AND email LIKE 'tmp-%@chrisshi168.dpdns.org';

          -- after Tina
          SELECT account_id,email,user_id,is_del
          FROM account
          WHERE user_id=2 AND is_del=0
          ORDER BY account_id;

          -- remaining admin tmp
          SELECT account_id,email,user_id,is_del
          FROM account
          WHERE is_del=0 AND user_id=1 AND email LIKE 'tmp-%@chrisshi168.dpdns.org'
          ORDER BY account_id;
          SQL
          npx wrangler@3 d1 execute cloud-mail-db --remote --file /tmp/bind.sql --json | tee /tmp/d1-result.json
          mkdir -p ops
          {
            echo '# D1 admin Tina tmp bind result'
            echo
            echo "- run_at_utc: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo '- target: active `tmp-* @chrisshi168.dpdns.org` mailboxes from `user_id=1` to Tina `user_id=2`'
            echo '- workflow: self-deleting one-shot'
            echo
            echo '```json'
            cat /tmp/d1-result.json
            echo '```'
          } > ops/d1-admin-tina-tmp-bind-result.md
      - name: Self cleanup and commit verification
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/d1-admin-tina-tmp-bind.yml
          git add ops/d1-admin-tina-tmp-bind-result.md
          git commit -m 'ops: bind tmp mailboxes to Tina via D1'
          git push
